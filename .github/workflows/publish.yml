name: Publish Presentation
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - deps: actions/checkout@v3
      - name: Build Marp Slide
        uses: docker://marpteam/marp-cli:latest
        with:
          args: slides.md -o index.html --html
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Der Ordner, in dem die index.html liegt
