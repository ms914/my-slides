name: Publish Presentation
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      

      - name: Build Marp Slide
        uses: docker://marpteam/marp-cli:latest
        with:
          # Wir nutzen die Umgebungsvariable des Runners, um Schreibrechte zu garantieren
          args: slides.md -o index.html --html
        env:
          MARP_USER: "1001:121"
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Der Ordner, in dem die index.html liegt
